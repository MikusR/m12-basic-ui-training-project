<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="view-transition" content="same-origin" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelter — Home</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

  <!-- Navigation — same on every page -->
  <!-- ADMIN-only: only render the "Add animal" link when isAdmin is true -->
  <nav>
    <a th:href="@{/}">Home</a>
    <a th:href="@{/animals}">All animals</a>
    <a th:if="${isAdmin}" th:href="@{/animals/new}">Add animal</a>
  </nav>

  <main>
    <h1>Welcome to the Shelter</h1>
    <p>We care for cats, dogs, and other animals looking for a loving home.</p>
    <p>Browse our available animals or register a new arrival.</p>
    <a th:href="@{/animals}" class="cta">See all animals</a>
  </main>

</body>
</html>
