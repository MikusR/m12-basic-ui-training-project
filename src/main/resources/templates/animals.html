<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Shelter Animals</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<p role="status" th:if="${message}"
   th:text="${message}"></p>
<main>
    <h1>Shelter Animals</h1>
    <section aria-label="Animal list">
        <ul>
            <li th:each="animal : ${animals}">
                <img height="200" style="object-fit: cover;"
                     th:alt="${animal.name}" th:src="${animal.imageUrl}" width="300">
                <div class="info">
                    <a th:href="@{/animals/{id}(id=${animal.id})}"><strong th:text="${animal.name}"></strong><span
                            th:classappend="${animal.status.name() == 'ADOPTED'} ? 'badge-adopted' : 'badge-available'"></span></a>.

                    — <span th:text="${animal.type}"></span> | <span
                        th:text="${animal.breed}"></span> | Age: <span th:text="${animal.age}"></span>
                    <span th:class="|status-${#strings.toLowerCase(animal.status)}|" th:text="${animal.status}"></span>
                    <p th:if="${isAdmin && animal.adoptionNote != null}" th:text="${animal.adoptionNote}"></p>
                    <p th:text="${animal.description}"></p>

                    <form method="POST"
                          onsubmit="event.preventDefault(); fetch(this.action, { method: 'POST' }).then(res => { if (res.ok) { location.reload(); } else { alert('Adoption failed'); } });"
                          style="display:inline;"
                          th:action="@{/api/animals/{id}/adopt(id=${animal.id})}"
                          th:if="${isUser && #strings.toString(animal.status) == 'AVAILABLE'}">
                        <button type="submit">
                            Adopt
                        </button>
                    </form>
                </div>
            </li>
        </ul>
    </section>
</main>
</body>
</html>
